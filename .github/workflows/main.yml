name: Auto Deploy

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: connect and update
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: 65.0.135.254
          username: ec2-user
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd url-shortener
            git pull
            sudo docker-compose down
            sudo docker-compose up -d --build






      

      
